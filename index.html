<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор щита v2.2 (Масштабна корекція)</title>
    <style>
        :root {
            /* МАТЕМАТИЧНА КОРЕКЦІЯ:
               Оскільки ваш принтер видає 23см замість 21.5см, 
               ми зменшуємо базову ширину модуля на ~7%.
               Було 17.91mm -> Стало 16.74mm
            */
            --unit-w: 16.74mm; 
        }

        @page {
            size: A4 portrait;
            margin: 0; /* Прибираємо системні поля */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 20px;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* ПАНЕЛЬ КЕРУВАННЯ (не друкується) */
        .ui-panel { 
            background: #f5f5f5; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd;
        }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 10px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: left; }
        input, select { width: 100%; border: none; height: 30px; font-size: 14px; }

        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-gen { background: #007bff; color: white; width: 100%; margin-top: 10px; }
        .btn-print { background: #6c757d; color: white; margin-top: 10px; display: none; }

        /* ОБЛАСТЬ ДРУКУ */
        #print-area {
            background: white;
            padding: 10mm; /* Внутрішній відступ на папері */
        }

        .din-rail { 
            display: flex !important; 
            flex-direction: row !important;
            flex-wrap: nowrap !important; 
            border: 0.1mm dashed #000; 
            width: fit-content; 
            margin-bottom: 5mm;
            background: white;
        }

        .label { 
            box-sizing: border-box; 
            border-right: 0.1mm dashed #000; 
            height: 30mm; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            position: relative;
            flex-shrink: 0; /* Забороняємо браузеру змінювати ширину */
            overflow: hidden;
        }
        
        .w-1 { width: var(--unit-w); } 
        .w-2 { width: calc(var(--unit-w) * 2); } 
        .w-3 { width: calc(var(--unit-w) * 3); } 
        .w-4 { width: calc(var(--unit-w) * 4); }

        .t-bar { width: 100%; height: 5.5mm; border-bottom: 0.1mm solid #000; font-size: 7pt; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .l-tag { position: absolute; top: 6mm; left: 1.5mm; font-size: 6.5pt; font-weight: bold; }
        .l-name { font-weight: bold; font-size: 8pt; margin-top: 10mm; padding: 0 1mm; line-height: 1.1; }
        .l-num { position: absolute; bottom: 0.5mm; right: 1mm; font-size: 7pt; color: #888; }

        /* Кольори */
        .type-blank { background: #eee; }
        .type-light { background: #fff176; } 
        .type-socket { background: #81c784; } 
        .type-heavy { background: #e57373; }

        @media print {
            .ui-panel { display: none !important; }
            body { margin: 0; padding: 0; }
            #print-area { padding: 10mm 0 0 10mm; } /* Позиціонування на аркуші */
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <h3>⚡️ Налаштування масштабу (Поточна ширина модуля: 16.74мм)</h3>
    <table id="dataTable">
        <thead>
            <tr><th>Ряд</th><th>Позначка</th><th>Назва</th><th>Тип</th><th>Ширина</th><th></th></tr>
        </thead>
        <tbody id="tBody"></tbody>
    </table>
    <button class="btn" style="background:#28a745; color:white;" onclick="addRow()">+ Додати лінію</button>
    <button class="btn btn-gen" onclick="generate()">Сформувати наклейки</button>
    <button class="btn btn-print" id="btnPrint" onclick="window.print()">🖨 РОЗДРУКУВАТИ</button>
    <p style="color:red; font-size: 0.85em; margin-top:10px;">
        УВАГА: У вікні друку виберіть <b>Масштаб: 100%</b> та <b>Поля: Відсутні (None)</b>.
    </p>
</div>

<div id="print-area"></div>

<script>
const DeviceTypes = {
    BLANK:  { label: '', class: 'type-blank' },
    LIGHT:  { label: 'Світло', class: 'type-light' },
    SOCKET: { label: 'Розетки', class: 'type-socket' },
    HEAVY:  { label: 'Силове', class: 'type-heavy' }
};

function addRow(r=1, tag='', name='', type='BLANK', p=1) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td><input type="number" class="r-row" value="${r}" style="width:40px"></td>
        <td><input type="text" class="r-tag" value="${tag}" placeholder="QF1"></td>
        <td><input type="text" class="r-name" value="${name}" placeholder="Назва..."></td>
        <td><select class="r-type">${Object.entries(DeviceTypes).map(([k,v])=>`<option value="${k}" ${type===k?'selected':''}>${v.label || '—'}</option>`).join('')}</select></td>
        <td><select class="r-p">${[1,2,3,4].map(v=>`<option value="${v}" ${p==v?'selected':''}>${v}</option>`).join('')}</select></td>
        <td><button onclick="this.parentElement.parentElement.remove()">✕</button></td>
    `;
    document.getElementById('tBody').appendChild(tr);
}

function generate() {
    const limit = 12; // Модулів на рейку
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    document.getElementById('btnPrint').style.display = 'block';

    const rows = Array.from(document.querySelectorAll('#tBody tr')).map(tr => ({
        r: tr.querySelector('.r-row').value,
        tag: tr.querySelector('.r-tag').value,
        name: tr.querySelector('.r-name').value,
        type: tr.querySelector('.r-type').value,
        p: parseInt(tr.querySelector('.r-p').value)
    }));

    const grouped = {};
    rows.forEach(item => { if(!grouped[item.r]) grouped[item.r] = []; grouped[item.r].push(item); });

    let gIdx = 1;
    Object.keys(grouped).sort((a,b)=>a-b).forEach(rNum => {
        let rail = document.createElement('div');
        rail.className = 'din-rail';
        let used = 0;

        grouped[rNum].forEach(item => {
            if (used + item.p > limit) {
                area.appendChild(rail);
                rail = document.createElement('div'); rail.className = 'din-rail';
                used = 0;
            }
            const label = document.createElement('div');
            label.className = `label w-${item.p}`;
            const t = DeviceTypes[item.type];
            label.innerHTML = `
                <div class="t-bar ${t.class}">${t.label}</div>
                <div class="l-tag">${item.tag}</div>
                <div class="l-name">${item.name}</div>
                <div class="l-num">${item.p > 1 ? gIdx+'-'+(gIdx+item.p-1) : gIdx}</div>
            `;
            rail.appendChild(label);
            used += item.p; gIdx += item.p;
        });
        area.appendChild(rail);
    });
}

// Початковий рядок
addRow(1, 'QS1', 'Ввідний', 'HEAVY', 3);
</script>
</body>
</html>
