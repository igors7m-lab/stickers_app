<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор маркування щита</title>
    <style>
    :root {
        --background-primary: #ffffff;
        --background-primary-alt: #f5f5f5;
        --background-secondary: #e5e5e5;
        --background-modifier-border: #ddd;
        --text-normal: #333;
        
        /* Коригування: 215мм / 12 = 17.916. 
           Ми ставимо 17.85, щоб врахувати товщину ліній (borders) */
        --unit-w: 17.85mm; 
    }

    /* ФІКСАЦІЯ ПАПЕРУ ПРИ ДРУЦІ */
    @page {
        size: A4 portrait;
        margin: 0; /* Видаляємо поля принтера */
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background-color: #f0f2f5;
        margin: 20px;
        color: var(--text-normal);
        -webkit-print-color-adjust: exact; /* Щоб кольори не блідли при друці */
    }

    @media print { 
        body { 
            margin: 0; 
            padding: 5mm; /* Невеликий відступ від краю аркуша, щоб принтер не "зажував" текст */
            background: white; 
        }
        .ui-panel { display: none !important; } 
        .shield-wrapper { width: auto; margin: 0; }
        .din-rail { 
            page-break-inside: avoid; 
            margin-bottom: 2mm; 
            display: flex !important; /* Гарантуємо, що автомати стоять в ряд */
        } 
    }

    .shield-wrapper .din-rail { 
        display: flex; 
        flex-wrap: nowrap; 
        border: 0.1mm dashed #000; 
        background: white; 
        margin-bottom: 5mm; 
        width: fit-content; 
    }
    
    .shield-wrapper .label { 
        box-sizing: border-box; 
        border-right: 0.1mm dashed #000; 
        height: 30mm; 
        position: relative; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        background: white; 
        color: black; 
        overflow: hidden;
        flex-shrink: 0; /* Забороняємо браузеру стискати наклейку */
    }
    /* Решта стилів без змін... */
</style>
</head>
<body>

<div class="shield-wrapper" id="mainContainer">
    <div class="ui-panel">
        <button class="btn-clear" id="btnClear">Очистити все</button>
        <button class="btn btn-import" id="btnToggleImport">📥 Імпорт Markdown / CSV</button>
        
        <h3 style="margin-top: 0; margin-bottom: 10px;">⚡️ Конструктор щита</h3>
        
        <div id="import-panel">
            <div style="font-size: 0.85em; margin-bottom: 5px; color: var(--text-muted);">
                Підтримується Markdown (|) або CSV (,). Формат: №, Позначка, Назва, Ширина, Тип, Ряд
            </div>
            <textarea id="importText" placeholder="Приклад CSV: 1, QF1, Світло кухня, 1, LIGHT, 1"></textarea>
            <button class="btn btn-add" id="btnProcessImport" style="width: 100%;">Обробити дані</button>
        </div>

        <div style="margin-bottom: 15px; font-size: 0.9em;">
            <label>Модулів на рейку:
                <select id="railLimit" style="width: auto; display: inline-block; padding: 4px; border: 1px solid #ccc !important; border-radius: 4px !important; height: auto;">
                    <option value="12" selected>12 (215мм)</option>
                    <option value="18">18 (322мм)</option>
                    <option value="24">24 (430мм)</option>
                </select>
            </label>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 60px; text-align: center;">Ряд</th>
                    <th style="width: 80px;">Поз.</th>
                    <th>Назва лінії</th>
                    <th style="width: 120px;">Тип</th>
                    <th style="width: 60px; text-align: center;">Шир.</th>
                    <th style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <button class="btn btn-add" id="btnAdd">+ Додати лінію</button>
        <button class="btn btn-gen" id="btnGen">Сформувати наклейки</button>
        <button class="btn btn-print" id="btnPrint">🖨 Роздрукувати</button>
    </div>
    
    <div id="print-area"></div>
</div>

<script>
const DeviceTypes = {
    BLANK:  { label: '', class: 'type-blank' }, // Пустий за замовчуванням
    LIGHT:  { label: 'Світло', class: 'type-light' },
    SOCKET: { label: 'Розетки', class: 'type-socket' },
    HEAVY:  { label: 'Силове', class: 'type-heavy' },
    RCCB:   { label: 'ПЗВ/Диф', class: 'type-rccb' },
    GEN:    { label: 'Генератор', class: 'type-gen' },
    SEC:    { label: 'Безпека', class: 'type-sec' },
    NET:    { label: 'IT', class: 'type-net' },
    CLIMAT: { label: 'Клімат', class: 'type-climat' }
};

const tableBody = document.getElementById('tableBody');
const railLimit = document.getElementById('railLimit');
const printArea = document.getElementById('print-area');
const btnPrint = document.getElementById('btnPrint');

function getRowSum(rNum, excludeTr = null) {
    let sum = 0;
    document.querySelectorAll('#tableBody tr').forEach(row => {
        if (row !== excludeTr && parseInt(row.querySelector('.row-num').value) === parseInt(rNum)) {
            sum += parseInt(row.querySelector('.row-phases').value) || 0;
        }
    });
    return sum;
}

function getNextTag(tag) {
    if (!tag) return '';
    const match = tag.match(/^(.*?)(\d+)$/);
    if (match) {
        const numStr = match[2];
        const nextNum = (parseInt(numStr, 10) + 1).toString();
        return match[1] + nextNum.padStart(numStr.length, '0');
    }
    return tag;
}

function saveData() {
    const rows = document.querySelectorAll('#tableBody tr');
    const data = Array.from(rows).map(row => ({
        r: row.querySelector('.row-num').value,
        tag: row.querySelector('.row-tag').value,
        n: row.querySelector('.row-name').value,
        t: row.querySelector('.row-type').value,
        p: row.querySelector('.row-phases').value
    }));
    localStorage.setItem('shield_data', JSON.stringify(data));
    localStorage.setItem('shield_limit', railLimit.value);
}

function addRow(rNum = 1, tag = '', name = '', type = 'BLANK', phases = 1) {
    const tr = document.createElement('tr');
    
    let typeOptions = Object.entries(DeviceTypes).map(([key, value]) => 
        `<option value="${key}" ${type === key ? 'selected' : ''}>${value.label || '—'}</option>`
    ).join('');

    let rowOptions = Array.from({length: 20}, (_, i) => i + 1).map(i => 
        `<option value="${i}" ${parseInt(rNum) === i ? 'selected' : ''}>${i}</option>`
    ).join('');

    tr.innerHTML = `
        <td><select class="row-num">${rowOptions}</select></td>
        <td><input type="text" class="row-tag" value="${tag}" placeholder="QF1"></td>
        <td><input type="text" class="row-name" value="${name}" placeholder="Введіть назву..."></td>
        <td><select class="row-type">${typeOptions}</select></td>
        <td><select class="row-phases">${[1,2,3,4].map(v => `<option value="${v}" ${phases == v ? 'selected' : ''}>${v}</option>`).join('')}</select></td>
        <td><button class="btn-del">✕</button></td>
    `;

    const numSelect = tr.querySelector('.row-num');
    const phaseSelect = tr.querySelector('.row-phases');

    numSelect.dataset.prev = rNum;
    phaseSelect.dataset.prev = phases;

    numSelect.addEventListener('change', function() {
        if (getRowSum(this.value, tr) + parseInt(phaseSelect.value) > parseInt(railLimit.value)) {
            alert('Недостатньо місця в ряду!');
            this.value = this.dataset.prev;
        } else {
            this.dataset.prev = this.value;
            saveData();
        }
    });

    phaseSelect.addEventListener('change', function() {
        if (getRowSum(numSelect.value, tr) + parseInt(this.value) > parseInt(railLimit.value)) {
            alert('Ряд переповнений!');
            this.value = this.dataset.prev;
        } else {
            this.dataset.prev = this.value;
            saveData();
        }
    });

    tr.querySelector('.row-tag').addEventListener('input', saveData);
    tr.querySelector('.row-name').addEventListener('input', saveData);
    tr.querySelector('.row-type').addEventListener('change', saveData);
    tr.querySelector('.btn-del').addEventListener('click', () => { tr.remove(); saveData(); });

    tableBody.appendChild(tr);
    saveData();
}

document.getElementById('btnToggleImport').onclick = () => {
    const panel = document.getElementById('import-panel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
};

document.getElementById('btnAdd').onclick = () => {
    const rows = document.querySelectorAll('#tableBody tr');
    let targetRow = 1, nextTag = '', nextType = 'BLANK', nextPhases = 1;

    if(rows.length > 0) {
        const last = rows[rows.length - 1];
        targetRow = parseInt(last.querySelector('.row-num').value);
        nextTag = getNextTag(last.querySelector('.row-tag').value);
        nextType = last.querySelector('.row-type').value;
        nextPhases = parseInt(last.querySelector('.row-phases').value);
        if (getRowSum(targetRow) + nextPhases > parseInt(railLimit.value)) targetRow++;
    }
    addRow(targetRow, nextTag, '', nextType, nextPhases);
};

document.getElementById('btnGen').onclick = () => {
    const limit = parseInt(railLimit.value);
    const rows = Array.from(document.querySelectorAll('#tableBody tr'));
    printArea.innerHTML = '';
    btnPrint.style.display = 'inline-block';

    const grouped = {};
    rows.forEach(row => {
        const r = row.querySelector('.row-num').value;
        if (!grouped[r]) grouped[r] = [];
        grouped[r].push({
            tag: row.querySelector('.row-tag').value,
            name: row.querySelector('.row-name').value,
            typeKey: row.querySelector('.row-type').value,
            phases: parseInt(row.querySelector('.row-phases').value)
        });
    });

    let globalIdx = 1;
    Object.keys(grouped).sort((a,b)=>a-b).forEach(rNum => {
        let rail = document.createElement('div');
        rail.className = 'din-rail';
        let used = 0;

        grouped[rNum].forEach(item => {
            if (used + item.phases > limit) {
                printArea.appendChild(rail);
                rail = document.createElement('div');
                rail.className = 'din-rail';
                used = 0;
            }
            const label = document.createElement('div');
            label.className = `label w-${item.phases}`;
            const typeInfo = DeviceTypes[item.typeKey];
            const numLabel = item.phases > 1 ? `${globalIdx}-${globalIdx + item.phases - 1}` : globalIdx;

            label.innerHTML = `
                <div class="t-bar ${typeInfo.class}">${typeInfo.label}</div>
                ${item.tag ? `<div class="l-tag">${item.tag}</div>` : ''}
                <div class="l-name">${item.name}</div>
                <div class="l-num">${numLabel}</div>
            `;
            rail.appendChild(label);
            used += item.phases;
            globalIdx += item.phases;
        });
        printArea.appendChild(rail);
    });
};

document.getElementById('btnProcessImport').onclick = () => {
    const text = document.getElementById('importText').value.trim();
    if (!text) return;
    const lines = text.split('\n');
    lines.forEach(line => {
        let cols = [];
        if (line.includes('|')) {
            cols = line.split('|').map(c => c.trim());
            // Видаляємо порожні елементи з країв Markdown рядка
            if (cols[0] === '') cols.shift();
        } else if (line.includes(',')) {
            cols = line.split(',').map(c => c.trim());
        } else {
            return;
        }

        if (cols.length >= 3 && !line.includes('---') && !line.toLowerCase().includes('назва')) {
            // Формат за замовчуванням (№, Позначка, Назва, Ширина, Тип, Ряд)
            // Markdown: | 1 | QF1 | Назва | 1 | LIGHT | 1 |
            // CSV: 1, QF1, Назва, 1, LIGHT, 1
            
            const tag = cols[1] || '';
            const name = cols[2] || '';
            const width = parseInt(cols[3]) || 1;
            const type = cols[4] && DeviceTypes[cols[4]] ? cols[4] : 'BLANK';
            const row = parseInt(cols[5]) || 1;

            addRow(row, tag, name, type, width);
        }
    });
    document.getElementById('importText').value = '';
    document.getElementById('import-panel').style.display = 'none';
};

document.getElementById('btnClear').onclick = () => {
    if(confirm('Очистити?')) { tableBody.innerHTML = ''; localStorage.clear(); }
};

btnPrint.onclick = () => window.print();

// Завантаження даних
const savedData = localStorage.getItem('shield_data');
if (savedData) {
    JSON.parse(savedData).forEach(d => addRow(d.r, d.tag, d.n, d.t, d.p));
} else {
    addRow(1, 'QS1', 'Ввідний автомат', 'HEAVY', 3);
}
</script>
</body>
</html>
