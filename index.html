<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор маркування щита</title>
    <style>
        :root {
            --background-primary: #ffffff;
            --background-primary-alt: #f5f5f5;
            --background-secondary: #e5e5e5;
            --background-modifier-border: #ddd;
            --text-normal: #333;
            --text-muted: #666;
            
            --scale-factor: 1;
            --real-w: 17.9;
            --real-h: 30;
            
            --mm-to-px: 3.78px;
            --unit-w: calc(var(--real-w) * var(--scale-factor) * var(--mm-to-px)); 
            --unit-h: calc(var(--real-h) * var(--scale-factor) * var(--mm-to-px));
        }

        @page {
            size: A4 landscape; 
            margin-top: 5mm;
            margin-left: 5mm;
            margin-right: 5mm;
            margin-bottom: 5mm;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 20px;
            color: var(--text-normal);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .shield-wrapper { max-width: 1150px; margin: 0 auto; }
        .ui-panel { 
            background: var(--background-primary-alt); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 10px 0; 
            font-size: 0.9em; 
            border: 1px solid var(--background-modifier-border); 
            background: white; 
        }

        th { 
            padding: 8px; 
            border: 1px solid var(--background-modifier-border); 
            text-align: left; 
            color: var(--text-muted); 
            background: var(--background-secondary); 
            font-size: 0.85em; 
            text-transform: uppercase; 
        }

        td { 
            padding: 0; 
            border: 1px solid var(--background-modifier-border); 
            vertical-align: middle; 
        }
        
        input, select { 
            width: 100%; 
            height: 36px; 
            padding: 0 8px; 
            margin: 0; 
            border: none !important; 
            background: white !important; 
            color: var(--text-normal); 
            font-size: 0.95em; 
            outline: none !important; 
            box-sizing: border-box; 
        }

        .input-calib {
            width: 50px;
            min-width: 60px;
            height: 36px;
            padding: 2px 8px;
            border: 1px solid #ccc !important;
            background: white !important;
            font-size: 0.9em;
            color: var(--text-normal);
            border-radius: 6px;
            box-sizing: border-box;
        }
            
        .mod-idx { 
            font-size: 0.85em; 
            color: var(--text-muted); 
            text-align: center; 
            font-weight: bold; 
            display: block; 
        }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; transition: 0.2s; }
        .btn-add { background: #17a2b8; color: white; }
        .btn-gen { background: #007bff; color: white; width: 100%; margin-top: 15px; font-size: 1.1em; }
        .btn-print { background: #6c757d; color: white; margin-top: 10px; display: none; }
        .btn-import { background: #17a2b8; color: white; float: right; margin-left: 10px; }
        .btn-export { background: #ffffff; color: var(--text-muted); float: right; }
        .btn-del { background: transparent; color: #dc3545; width: 100%; border: none; cursor: pointer; font-size: 1.1em; }
        .btn-clear { background: transparent; color: #f44336; text-decoration: underline; cursor: pointer; border: none; margin-bottom: 10px; }

        #import-panel { display: none; background: #fff; border: 1px solid var(--background-modifier-border); padding: 15px; border-radius: 6px; margin-bottom: 15px; margin-top: 15px; clear: both; }
        #import-panel textarea { width: 100%; height: 120px; font-family: monospace; padding: 10px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc !important; background: #fafafa !important; }

        .settings-row { display: flex; gap: 20px; margin-bottom: 15px; align-items: center; background: #e9ecef; padding: 10px; border-radius: 10px; flex-wrap: wrap; }
        .calibration-box { background: #f6f5f5; padding: 10px; border-radius: 10px; border: 1px solid #e9ecef; display: flex; align-items: center; flex-wrap: wrap; gap: 15px; }

        .test-line-box {
            width: 100mm; 
            height: 5mm; 
            border-bottom: 0.4mm solid black;
            border-left: 0.4mm solid black;
            border-right: 0.4mm solid black;
            position: relative;
            box-sizing: content-box;
}

        .test-line-box {
            width: calc(100mm * var(--scale-factor));
            height: 2mm; 
            border-bottom: 0.2mm solid black;
            border-left: 0.2mm solid black;
            border-right: 0.2mm solid black;
            position: relative;
            box-sizing: content-box;
        }

        .test-line-box::after {
            content: "← 100 mm →";
            position: absolute;
            bottom: 2mm;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 7pt;
            color: #4c4b4b;
        }

        .din-rail { 
            display: flex; 
            flex-wrap: nowrap; 
            border: 0.1mm solid #000; 
            background: white; 
            margin-bottom: 0; /*відступи між рядмаи наклейок*/
            width: max-content; 
        }

        .label { 
            box-sizing: border-box; 
            border-right: 0.1mm solid #000; 
            height: var(--unit-h); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            background: white; 
            color: black; 
            overflow: hidden; 
            flex-shrink: 0; 
        }

        .label:last-child { border-right: none; }
        
        .w-1 { width: var(--unit-w); min-width: var(--unit-w); max-width: var(--unit-w); } 
        .w-2 { width: calc(var(--unit-w) * 2); min-width: calc(var(--unit-w) * 2); max-width: calc(var(--unit-w) * 2); } 
        .w-3 { width: calc(var(--unit-w) * 3); min-width: calc(var(--unit-w) * 3); max-width: calc(var(--unit-w) * 3); } 
        .w-4 { width: calc(var(--unit-w) * 4); min-width: calc(var(--unit-w) * 4); max-width: calc(var(--unit-w) * 4); }
        
        .t-bar { position: absolute; top: 0; left: 0; width: 100%; height: 5.5mm; border-bottom: 0.1mm solid #000; display: flex; align-items: center; justify-content: center; font-size: 7pt; font-weight: bold; text-transform: uppercase; box-sizing: border-box; }
        .l-tag { position: absolute; top: 6mm; left: 1.5mm; font-size: 6.5pt; font-weight: bold; color: #444; }
        .l-name { font-weight: bold; font-size: 8pt; margin-top: 10mm; width: 100%; line-height: 1.1; padding: 0 1mm; box-sizing: border-box; }
        .l-num { position: absolute; bottom: 0.5mm; right: 1mm; font-size: 7pt; color: #888; }

        .type-blank { background: transparent; }
        .type-light { background: #fff176; } 
        .type-socket { background: #81c784; } 
        .type-heavy { background: #e57373; } 
        .type-rccb { background: #64b5f6; } 
        .type-gen { background: #ffb74d; } 
        .type-net { background: #455a64; color: #fff; }
        .type-climate { background: #ff8a65; } 
        .type-security { background: #ba68c8; color: #fff; } 
        .type-smart { background: #4db6ac; color: #fff; } 
        .type-power { background: #aed581; } 
        .type-appliances { background: #7986cb; color: #fff; }

        @media print { 
            html, body { 
                width: 297mm;
                height: 210mm;
                zoom: 100% !important;
                background: white; 
                margin: 5mm; 
                padding: 0; }
            .ui-panel { display: none !important; } 
            .test-line-component { padding: 0; margin: 0; }
        }
    </style>
</head>
<body>

<div class="shield-wrapper">
    <div class="ui-panel">
        <div>
            <h3 style="margin-top: 0; display: inline-block;">⚡️ Конструктор маркування</h3>
            <button class="btn btn-import" id="btnToggleImport">📥 Імпорт даних</button>
            <button class="btn btn-export" id="btnExport">📤 Експорт у CSV</button>
        </div>
        
        <div id="import-panel">
            <div style="font-size: 0.85em; color: var(--text-muted); margin-bottom: 10px;">
                <strong>Вкажіть колонки даних:</strong>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; font-size: 0.85em;">
                <div>Позначка:<br><select id="mTag" class="input-calib" style="width: 50px;"><option value="0" selected>1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option><option value="4">5</option></select></div>
                <div>Назва:<br><select id="mName" class="input-calib" style="width: 50px;"><option value="0">1</option><option value="1" selected>2</option><option value="2">3</option><option value="3">4</option><option value="4">5</option></select></div>
                <div>Ширина:<br><select id="mWidth" class="input-calib" style="width: 50px;"><option value="0">1</option><option value="1">2</option><option value="2" selected>3</option><option value="3">4</option><option value="4">5</option></select></div>
                <div>Тип:<br><select id="mType" class="input-calib" style="width: 50px;"><option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3" selected>4</option><option value="4">5</option></select></div>
                <div>Ряд:<br><select id="mRow" class="input-calib" style="width: 50px;"><option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option><option value="4" selected>5</option></select></div>
            </div>
            <textarea id="importText" placeholder="Вставте текст у вигляді CSV або Markdown text..."></textarea>
            <button class="btn btn-add" id="btnProcessImport" style="width: 100%;">Обробити дані</button>
        </div>

        <div class="settings-row">
            <div>
                Модулів на рейку:
                <select id="railLimit" style="width: auto; border: 1px solid #393939 !important; padding: 2px;">
                    <option value="12" selected>12</option>
                    <option value="18">18</option>
                    <option value="24">24</option>
                    <option value="36">36</option>
                </select>
            </div>
            <div>
                <strong>Ширина (мм):</strong>
                <input type="number" step="0.1" id="realWidth" class="input-calib" value="17.9" title="Скільки міліметрів ви хочете отримати на папері">
            </div>
            <div>
                <strong>Висота (мм):</strong>
                <input type="number" step="0.1" id="realHeight" class="input-calib" value="30">
            </div>
        </div>

        <div class="calibration-box">
            <div style="flex: 1;">
                <strong>⚙️ Коригування принтера:</strong> Роздрукуйте тестову лінію. Якщо на папері вона НЕ 100 мм, впишіть її реальний розмір тут ➔
            </div>
            <div>
                <input type="number" step="0.1" id="measuredLine" class="input-calib" value="100" style="width: 70px; font-weight: bold; background: #ffffff !important;"> мм
            </div>
            <button class="btn" id="btnGenTest" style="background: #17a2b8; color: white;">📏 Сформувати тестову лінію</button>
        </div>
        
        <br>
        <button class="btn-clear" id="btnClear">🗑 Очистити все</button>

        <table>
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;">#</th>
                    <th style="width: 60px; text-align: center;">Ряд</th>
                    <th style="width: 80px;">Позначка</th>
                    <th>Назва лінії</th>
                    <th style="width: 120px;">Тип</th>
                    <th style="width: 60px; text-align: center;">Ширина</th>
                    <th style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <button class="btn btn-add" id="btnAdd">+ Додати модуль</button>
        <button class="btn btn-gen" id="btnGen">Сформувати наклейки</button>
        <button class="btn btn-print" id="btnPrint">🖨 Роздрукувати</button>
    </div>
    
    <div id="print-area">
        <div id="labels-container"></div>
    </div>
</div>

<script>
const DeviceTypes = {
    BLANK:  { label: '', class: 'type-blank' },
    LIGHT:  { label: 'Світло', class: 'type-light' },
    SOCKET: { label: 'Розетки', class: 'type-socket' },
    HEAVY:  { label: 'Силове', class: 'type-heavy' },
    RCCB:   { label: 'ПЗВ/Диф', class: 'type-rccb' },
    GEN:    { label: 'Генератор', class: 'type-gen' },
    NET:    { label: 'Iнтернет', class: 'type-net' },
    CLIMATE: { label: 'Клімат', class: 'type-climate' },
    SECURITY: { label: 'Охорона', class: 'type-security' },
    SMART:   { label: 'Smart Home', class: 'type-smart' },
    POWER:  { label: 'Живлення', class: 'type-power' },
    APPL:   { label: 'Техніка', class: 'type-appliances' }
};

const tableBody = document.getElementById('tableBody');
const realWidth = document.getElementById('realWidth');
const realHeight = document.getElementById('realHeight');
const measuredLine = document.getElementById('measuredLine');
const labelsContainer = document.getElementById('labels-container');
const btnPrint = document.getElementById('btnPrint');
const btnGenTest = document.getElementById('btnGenTest');

realWidth.value = localStorage.getItem('shield_real_w') || '17.9';
realHeight.value = localStorage.getItem('shield_real_h') || '30';
measuredLine.value = localStorage.getItem('shield_measured') || '100';

function applyCalibration() {
    let w = parseFloat(realWidth.value) || 17.9;
    let h = parseFloat(realHeight.value) || 30;
    let m = parseFloat(measuredLine.value) || 100;
    let scale = 100 / m; 

    document.documentElement.style.setProperty('--scale-factor', scale);
    document.documentElement.style.setProperty('--real-w', w);
    document.documentElement.style.setProperty('--real-h', h);

    localStorage.setItem('shield_real_w', w);
    localStorage.setItem('shield_real_h', h);
    localStorage.setItem('shield_measured', m);
}

[realWidth, realHeight, measuredLine].forEach(input => input.addEventListener('input', applyCalibration));
applyCalibration();

function updateIndices() {
    let currentMod = 1;
    document.querySelectorAll('#tableBody tr').forEach(tr => {
        let p = parseInt(tr.querySelector('.row-phases').value) || 1;
        tr.querySelector('.mod-idx').innerText = p > 1 ? `${currentMod}-${currentMod + p - 1}` : currentMod;
        currentMod += p;
    });
}

function saveData() {
    updateIndices(); 
    const rows = document.querySelectorAll('#tableBody tr');
    const data = Array.from(rows).map(row => ({
        r: row.querySelector('.row-num').value, tag: row.querySelector('.row-tag').value,
        n: row.querySelector('.row-name').value, t: row.querySelector('.row-type').value,
        p: row.querySelector('.row-phases').value
    }));
    localStorage.setItem('shield_v2_data', JSON.stringify(data));
}

function addRow(rNum = 1, tag = '', name = '', type = 'BLANK', phases = 1) {
    const tr = document.createElement('tr');
    
    let typeOpts = Object.entries(DeviceTypes).map(([k, v]) => `<option value="${k}" ${type === k ? 'selected' : ''}>${v.label || '—'}</option>`).join('');
    
    if (!DeviceTypes[type] && type !== 'BLANK' && type !== '') {
        typeOpts += `<option value="${type}" selected>${type}</option>`;
    }
    
    let rowOpts = Array.from({length: 15}, (_, i) => `<option value="${i+1}" ${parseInt(rNum) === i+1 ? 'selected' : ''}>${i+1}</option>`).join('');

    tr.innerHTML = `
        <td><span class="mod-idx"></span></td>
        <td><select class="row-num">${rowOpts}</select></td>
        <td><input type="text" class="row-tag" value="${tag}" placeholder="QF1"></td>
        <td><input type="text" class="row-name" value="${name}" placeholder="Назва..."></td>
        <td><select class="row-type">${typeOpts}</select></td>
        <td><select class="row-phases">${[1,2,3,4].map(v => `<option value="${v}" ${phases == v ? 'selected' : ''}>${v}</option>`).join('')}</select></td>
        <td><button class="btn-del" title="Видалити">✕</button></td>
    `;
    tr.querySelectorAll('input, select').forEach(el => el.addEventListener('change', saveData));
    tr.querySelector('.btn-del').onclick = () => { tr.remove(); saveData(); };
    tableBody.appendChild(tr);
    saveData();
}

document.getElementById('btnToggleImport').onclick = () => {
    const p = document.getElementById('import-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
};

document.getElementById('btnExport').onclick = () => {
    const rows = document.querySelectorAll('#tableBody tr');
    if (rows.length === 0) return;
    let csv = "Позначка,Назва,Ширина,Тип,Ряд\n";
    rows.forEach(r => csv += `${r.querySelector('.row-tag').value.replace(/,/g,'')},${r.querySelector('.row-name').value.replace(/,/g,'')},${r.querySelector('.row-phases').value},${r.querySelector('.row-type').value},${r.querySelector('.row-num').value}\n`);
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    link.download = "shield_labels.csv";
    link.click();
};

document.getElementById('btnProcessImport').onclick = () => {
    const text = document.getElementById('importText').value.trim();
    if (!text) return;
    
    // Отримуємо індекси колонок з налаштувань інтерфейсу
    const [iTag, iName, iWidth, iType, iRow] = ['mTag','mName','mWidth','mType','mRow']
        .map(id => parseInt(document.getElementById(id).value));
    
    text.split('\n').forEach(line => {
        // Очищення рядка від символів таблиць Markdown
        let clean = line.replace(/^\||\|$/g, '').trim();
        if (!clean || clean.includes('---')) return; 
        
        let cols = clean.includes('|') ? clean.split('|') : clean.split(/[\t,;]/);
        cols = cols.map(c => c.trim());

        if (cols.length > 0 && (cols[iTag] || cols[iName])) {
            let rawType = cols[iType] ? cols[iType] : '';
            let finalType = 'BLANK'; // Значення за замовчуванням (пустий формат)
            let customTypeName = rawType; // Зберігаємо оригінальний текст для відображення

            if (rawType) {
                const searchStr = rawType.toLowerCase();

                // 1. Шукаємо збіг серед встановлених типів (по ключу або по мітці)
                const foundKey = Object.keys(DeviceTypes).find(key => 
                    key.toLowerCase() === searchStr || 
                    DeviceTypes[key].label.toLowerCase() === searchStr
                );

                if (foundKey) {
                    finalType = foundKey;
                } else {
                    // 2. Якщо збігу немає, використовуємо BLANK (білий), 
                    // але передаємо текст як назву типу
                    finalType = rawType; 
                }
            }

            addRow(
                parseInt(cols[iRow]) || 1, 
                cols[iTag] || '', 
                cols[iName] || '', 
                finalType, 
                parseInt(cols[iWidth]) || 1
            );
        }
    });
    
    document.getElementById('import-panel').style.display = 'none';
    document.getElementById('importText').value = '';
};

// --- ФОРМУВАННЯ ТЕСТОВОЇ ЛІНІЇ (ЕТАЛОН 100%) ---
btnGenTest.onclick = () => {
    labelsContainer.innerHTML = `
        <div class="test-line-component">
            <div style="font-size: 8pt; color: #666; margin-bottom: 5mm;">
            </div>
            <div class="test-line-box"></div>
        </div>
    `;
    btnPrint.style.display = 'inline-block';
    labelsContainer.scrollIntoView({ behavior: 'smooth' });
};

// --- ФОРМУВАННЯ НАКЛЕЙОК ---
document.getElementById('btnGen').onclick = () => {
    const limit = parseInt(document.getElementById('railLimit').value);
    const rows = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
        r: tr.querySelector('.row-num').value, tag: tr.querySelector('.row-tag').value,
        name: tr.querySelector('.row-name').value, type: tr.querySelector('.row-type').value,
        p: parseInt(tr.querySelector('.row-phases').value)
    }));

    labelsContainer.innerHTML = '';
    btnPrint.style.display = 'inline-block';

    const grouped = {};
    rows.forEach(item => { if(!grouped[item.r]) grouped[item.r] = []; grouped[item.r].push(item); });

    let globalIdx = 1;
    Object.keys(grouped).sort((a,b)=>a-b).forEach(rNum => {
        let rail = document.createElement('div'); rail.className = 'din-rail';
        let used = 0;
        grouped[rNum].forEach(item => {
            if (used + item.p > limit) {
                labelsContainer.appendChild(rail);
                rail = document.createElement('div'); rail.className = 'din-rail';
                used = 0;
            }
            const label = document.createElement('div'); label.className = `label w-${item.p}`;
            
            const tInfo = DeviceTypes[item.type];
            const barClass = tInfo ? tInfo.class : 'type-blank';
            const barLabel = tInfo ? tInfo.label : item.type; 

            label.innerHTML = `<div class="t-bar ${barClass}">${barLabel}</div>
                <div class="l-tag">${item.tag}</div><div class="l-name">${item.name}</div>
                <div class="l-num">${item.p > 1 ? globalIdx+'-'+(globalIdx+item.p-1) : globalIdx}</div>`;
            rail.appendChild(label);
            used += item.p; globalIdx += item.p;
        });
        labelsContainer.appendChild(rail);
    });
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};

document.getElementById('btnAdd').onclick = () => {
    const rows = tableBody.querySelectorAll('tr');
    
    if (rows.length > 0) {
        // Беремо останній рядок
        const lastRow = rows[rows.length - 1];
        
        // Зчитуємо значення з полів останнього рядка
        const lastRowNum = lastRow.querySelector('.row-num').value;
        const lastTag = lastRow.querySelector('.row-tag').value;
        const lastName = ""; // Назву зазвичай краще залишати пустою для нового модуля
        const lastType = lastRow.querySelector('.row-type').value;
        const lastPhases = lastRow.querySelector('.row-phases').value;

        // Спроба автоматично збільшити номер у позначці (наприклад, QF1 -> QF2)
        let nextTag = lastTag;
        const tagMatch = lastTag.match(/^(.*?)(\{0,1\}\d+)$/);
        if (tagMatch) {
            const prefix = tagMatch[1];
            const number = parseInt(tagMatch[2]);
            nextTag = prefix + (number + 1);
        }

        // Додаємо новий рядок із підтягнутими значеннями
        addRow(lastRowNum, nextTag, lastName, lastType, lastPhases);
    } else {
        // Якщо таблиця порожня, додаємо звичайний пустий рядок
        addRow();
    }
};

document.getElementById('btnClear').onclick = () => { if(confirm('Очистити все?')) { tableBody.innerHTML = ''; localStorage.removeItem('shield_v2_data'); updateIndices(); } };

btnPrint.onclick = () => { window.print(); };

const savedData = localStorage.getItem('shield_v2_data');
if (savedData) JSON.parse(savedData).forEach(d => addRow(d.r, d.tag, d.n, d.t, d.p)); else addRow(1, 'QS1', 'Ввід живлення ', 'HEAVY', 3);
</script>
