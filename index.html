<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор маркування щита v2.1</title>
    <style>
        :root {
            --background-primary: #ffffff;
            --background-primary-alt: #f5f5f5;
            --background-secondary: #e5e5e5;
            --background-modifier-border: #ddd;
            --text-normal: #333;
            --text-muted: #666;
            /* 215mm / 12 = 17.916mm. Ставимо 17.85mm, щоб компенсувати товщину рамок (border) */
            --unit-w: 17.85mm; 
        }

        /* НАЛАШТУВАННЯ ДЛЯ ПРИНТЕРА */
        @page {
            size: A4 portrait;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 20px;
            color: var(--text-normal);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .shield-wrapper { 
            max-width: 1100px;
            margin: 0 auto;
        }

        .ui-panel { 
            background: var(--background-primary-alt); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.9em; border: 1px solid var(--background-modifier-border); background: white; }
        th { padding: 8px; border: 1px solid var(--background-modifier-border); text-align: left; color: var(--text-muted); background: var(--background-secondary); font-size: 0.85em; text-transform: uppercase; }
        td { padding: 0; border: 1px solid var(--background-modifier-border); vertical-align: middle; }
        
        input, select { 
            width: 100%; height: 36px; padding: 0 8px; margin: 0;
            border: none !important; background: transparent !important; color: var(--text-normal); 
            font-size: 0.95em; outline: none !important; box-sizing: border-box;
        }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; transition: 0.2s; }
        .btn-add { background: #28a745; color: white; }
        .btn-gen { background: #007bff; color: white; width: 100%; margin-top: 15px; font-size: 1.1em; }
        .btn-print { background: #6c757d; color: white; margin-top: 10px; display: none; }
        .btn-import { background: #17a2b8; color: white; float: right; }
        .btn-del { background: transparent; color: #dc3545; width: 100%; border: none; cursor: pointer; font-size: 1.1em; }
        .btn-clear { background: transparent; color: #f44336; float: right; text-decoration: underline; cursor: pointer; border: none; margin-left: 10px; }

        #import-panel { display: none; background: #fff; border: 1px solid var(--background-modifier-border); padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        #import-panel textarea { width: 100%; height: 100px; font-family: monospace; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }

        /* СТИЛІ НАКЛЕЙОК */
        .din-rail { display: flex; flex-wrap: nowrap; border: 0.1mm dashed #000; background: white; margin-bottom: 5mm; width: fit-content; }
        .label { 
            box-sizing: border-box; 
            border-right: 0.1mm dashed #000; 
            height: 30mm; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            background: white; 
            color: black; 
            overflow: hidden;
            flex-shrink: 0; /* ЗАБОРОНА СТИСКАННЯ */
        }
        .label:last-child { border-right: none; }
        
        .w-1 { width: var(--unit-w); } 
        .w-2 { width: calc(var(--unit-w) * 2); } 
        .w-3 { width: calc(var(--unit-w) * 3); } 
        .w-4 { width: calc(var(--unit-w) * 4); }
        
        .t-bar { position: absolute; top: 0; left: 0; width: 100%; height: 5.5mm; border-bottom: 0.1mm solid #000; display: flex; align-items: center; justify-content: center; font-size: 7pt; font-weight: bold; text-transform: uppercase; }
        .l-tag { position: absolute; top: 6mm; left: 1.5mm; font-size: 6.5pt; font-weight: bold; color: #444; }
        .l-name { font-weight: bold; font-size: 8pt; margin-top: 10mm; width: 100%; line-height: 1.1; padding: 0 1mm; box-sizing: border-box; }
        .l-num { position: absolute; bottom: 0.5mm; right: 1mm; font-size: 7pt; color: #888; }

        /* ТИПИ КОЛЬОРІВ */
        .type-blank { background: transparent; }
        .type-light { background: #fff176; } 
        .type-socket { background: #81c784; } 
        .type-heavy { background: #e57373; } 
        .type-rccb { background: #64b5f6; } 
        .type-gen { background: #ffb74d; } 
        .type-net { background: #455a64; color: #fff; }

        @media print { 
            body { background: white; margin: 0; padding: 5mm; }
            .ui-panel { display: none !important; } 
            .shield-wrapper { width: 100%; margin: 0; }
            .din-rail { page-break-inside: avoid; margin-bottom: 2mm; display: flex !important; } 
        }
    </style>
</head>
<body>

<div class="shield-wrapper">
    <div class="ui-panel">
        <button class="btn-clear" id="btnClear">Очистити все</button>
        <button class="btn btn-import" id="btnToggleImport">📥 Імпорт CSV/Markdown</button>
        
        <h3 style="margin-top: 0;">⚡️ Конструктор маркування</h3>
        
        <div id="import-panel">
            <textarea id="importText" placeholder="CSV формат: Позначка, Назва, Ширина, Тип, Ряд"></textarea>
            <button class="btn btn-add" id="btnProcessImport" style="width: 100%;">Обробити</button>
        </div>

        <div style="margin-bottom: 10px;">
            Модулів на рейку:
            <select id="railLimit" style="width: auto; border: 1px solid #ccc !important; height: auto; padding: 2px;">
                <option value="12" selected>12 (215мм)</option>
                <option value="18">18</option>
                <option value="24">24</option>
            </select>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 60px; text-align: center;">Ряд</th>
                    <th style="width: 80px;">Поз.</th>
                    <th>Назва лінії</th>
                    <th style="width: 120px;">Тип</th>
                    <th style="width: 60px; text-align: center;">Шир.</th>
                    <th style="width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <button class="btn btn-add" id="btnAdd">+ Додати лінію</button>
        <button class="btn btn-gen" id="btnGen">Сформувати наклейки</button>
        <button class="btn btn-print" id="btnPrint">🖨 Роздрукувати</button>
    </div>
    
    <div id="print-area"></div>
</div>

<script>
const DeviceTypes = {
    BLANK:  { label: '', class: 'type-blank' },
    LIGHT:  { label: 'Світло', class: 'type-light' },
    SOCKET: { label: 'Розетки', class: 'type-socket' },
    HEAVY:  { label: 'Силове', class: 'type-heavy' },
    RCCB:   { label: 'ПЗВ/Диф', class: 'type-rccb' },
    GEN:    { label: 'Генератор', class: 'type-gen' },
    NET:    { label: 'IT', class: 'type-net' }
};

const tableBody = document.getElementById('tableBody');
const railLimit = document.getElementById('railLimit');
const printArea = document.getElementById('print-area');
const btnPrint = document.getElementById('btnPrint');

function saveData() {
    const rows = document.querySelectorAll('#tableBody tr');
    const data = Array.from(rows).map(row => ({
        r: row.querySelector('.row-num').value,
        tag: row.querySelector('.row-tag').value,
        n: row.querySelector('.row-name').value,
        t: row.querySelector('.row-type').value,
        p: row.querySelector('.row-phases').value
    }));
    localStorage.setItem('shield_v2_data', JSON.stringify(data));
}

function addRow(rNum = 1, tag = '', name = '', type = 'BLANK', phases = 1) {
    const tr = document.createElement('tr');
    let typeOpts = Object.entries(DeviceTypes).map(([k, v]) => `<option value="${k}" ${type === k ? 'selected' : ''}>${v.label || '—'}</option>`).join('');
    let rowOpts = Array.from({length: 15}, (_, i) => `<option value="${i+1}" ${parseInt(rNum) === i+1 ? 'selected' : ''}>${i+1}</option>`).join('');

    tr.innerHTML = `
        <td><select class="row-num">${rowOpts}</select></td>
        <td><input type="text" class="row-tag" value="${tag}" placeholder="QF1"></td>
        <td><input type="text" class="row-name" value="${name}" placeholder="Назва..."></td>
        <td><select class="row-type">${typeOpts}</select></td>
        <td><select class="row-phases">${[1,2,3,4].map(v => `<option value="${v}" ${phases == v ? 'selected' : ''}>${v}</option>`).join('')}</select></td>
        <td><button class="btn-del">✕</button></td>
    `;

    tr.querySelectorAll('input, select').forEach(el => el.addEventListener('change', saveData));
    tr.querySelector('.btn-del').onclick = () => { tr.remove(); saveData(); };
    tableBody.appendChild(tr);
    saveData();
}

document.getElementById('btnToggleImport').onclick = () => {
    const p = document.getElementById('import-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
};

document.getElementById('btnProcessImport').onclick = () => {
    const text = document.getElementById('importText').value.trim();
    text.split('\n').forEach(line => {
        let cols = line.includes('|') ? line.split('|').map(c=>c.trim()).filter(c=>c!=='') : line.split(',').map(c=>c.trim());
        if (cols.length >= 2) {
            // Очікуємо: Позначка, Назва, Ширина, Тип, Ряд
            addRow(cols[4]||1, cols[0], cols[1], cols[3]||'BLANK', parseInt(cols[2])||1);
        }
    });
    document.getElementById('import-panel').style.display = 'none';
};

document.getElementById('btnGen').onclick = () => {
    const limit = parseInt(railLimit.value);
    const rows = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
        r: tr.querySelector('.row-num').value,
        tag: tr.querySelector('.row-tag').value,
        name: tr.querySelector('.row-name').value,
        type: tr.querySelector('.row-type').value,
        p: parseInt(tr.querySelector('.row-phases').value)
    }));

    printArea.innerHTML = '';
    btnPrint.style.display = 'inline-block';

    const grouped = {};
    rows.forEach(item => { if(!grouped[item.r]) grouped[item.r] = []; grouped[item.r].push(item); });

    let globalIdx = 1;
    Object.keys(grouped).sort((a,b)=>a-b).forEach(rNum => {
        let rail = document.createElement('div');
        rail.className = 'din-rail';
        let used = 0;

        grouped[rNum].forEach(item => {
            if (used + item.p > limit) {
                printArea.appendChild(rail);
                rail = document.createElement('div'); rail.className = 'din-rail';
                used = 0;
            }
            const label = document.createElement('div');
            label.className = `label w-${item.p}`;
            const tInfo = DeviceTypes[item.type];
            label.innerHTML = `<div class="t-bar ${tInfo.class}">${tInfo.label}</div>
                <div class="l-tag">${item.tag}</div><div class="l-name">${item.name}</div>
                <div class="l-num">${item.p > 1 ? globalIdx+'-'+(globalIdx+item.p-1) : globalIdx}</div>`;
            rail.appendChild(label);
            used += item.p; globalIdx += item.p;
        });
        printArea.appendChild(rail);
    });
};

document.getElementById('btnAdd').onclick = () => addRow();
document.getElementById('btnClear').onclick = () => { if(confirm('Очистити?')) { tableBody.innerHTML = ''; localStorage.clear(); } };
btnPrint.onclick = () => window.print();

const saved = localStorage.getItem('shield_v2_data');
if (saved) JSON.parse(saved).forEach(d => addRow(d.r, d.tag, d.n, d.t, d.p)); else addRow(1, 'QS1', 'Ввід', 'HEAVY', 3);
</script>
</body>
</html>
